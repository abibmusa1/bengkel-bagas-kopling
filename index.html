<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Simulasi Sensor CBT</title>
</head>
<body>
    <h2>Simulasi Deteksi Fokus Layar</h2>
    <p>Status: <strong id="status-layar" style="color: green;">FOKUS (Aman)</strong></p>
    <p>Coba buka tab baru, minimalkan jendela ini, atau buka aplikasi lain.</p>

    <script>
        // Logika dasar yang digunakan developer CBT untuk mendeteksi kecurangan
        window.onblur = function() {
            document.getElementById("status-layar").innerText = "TIDAK FOKUS (Peringatan!)";
            document.getElementById("status-layar").style.color = "red";
            console.log("Log ke server: Peserta terdeteksi keluar dari layar.");
        };

        window.onfocus = function() {
            document.getElementById("status-layar").innerText = "FOKUS (Aman)";
            document.getElementById("status-layar").style.color = "green";
        };
    </script>
</body>
</html>
